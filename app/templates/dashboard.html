{% extends "base.html" %} {% block title %}Dashboard - ClimbSensei{% endblock %}
{% block content %}
<h1>Dashboard</h1>

<div id="stats" class="grid" style="margin-bottom: 2rem">
  <div class="stat-card">
    <h3 id="totalAnalyses">0</h3>
    <p>Total Analyses</p>
  </div>
  <div class="stat-card">
    <h3 id="totalSessions">0</h3>
    <p>Sessions</p>
  </div>
  <div class="stat-card">
    <h3 id="activeGoals">0</h3>
    <p>Active Goals</p>
  </div>
  <div class="stat-card">
    <h3 id="avgVelocity">0.00</h3>
    <p>Avg Velocity (m/s)</p>
  </div>
</div>

<div class="card">
  <h2>Recent Analyses</h2>
  <div id="recentAnalyses">
    <p style="color: #666; text-align: center">Loading...</p>
  </div>
</div>

<div class="card" style="margin-top: 2rem">
  <h2>Active Goals</h2>
  <div id="activeGoalsList">
    <p style="color: #666; text-align: center">Loading...</p>
  </div>
</div>
{% endblock %} {% block extra_js %}
<script>
  // Require authentication
  if (!authToken) {
    window.location.href = "/login";
  }

  async function loadDashboard() {
    try {
      // Load stats in parallel
      const [analysesRes, sessionsRes, goalsRes] = await Promise.all([
        apiRequest(`${API_BASE}/analyses`),
        apiRequest(`${API_BASE}/sessions`),
        apiRequest(`${API_BASE}/goals?active_only=true`),
      ]);

      const analyses = await analysesRes.json();
      const sessions = await sessionsRes.json();
      const goals = await goalsRes.json();

      // Update stats
      document.getElementById("totalAnalyses").textContent = analyses.length;
      document.getElementById("totalSessions").textContent = sessions.length;
      document.getElementById("activeGoals").textContent = goals.length;

      // Calculate average velocity
      if (analyses.length > 0) {
        const avgVelocity =
          analyses.reduce((sum, a) => sum + (a.avg_velocity || 0), 0) /
          analyses.length;
        document.getElementById("avgVelocity").textContent =
          avgVelocity.toFixed(3);
      }

      // Display recent analyses
      displayRecentAnalyses(analyses.slice(0, 5));

      // Display active goals
      displayActiveGoals(goals);
    } catch (error) {
      console.error("Failed to load dashboard:", error);
      showAlert("Failed to load dashboard data", "error");
    }
  }

  function displayRecentAnalyses(analyses) {
    const container = document.getElementById("recentAnalyses");

    if (analyses.length === 0) {
      container.innerHTML =
        '<p style="color: #666; text-align: center;">No analyses yet. <a href="/">Upload a video</a> to get started!</p>';
      return;
    }

    container.innerHTML = `
            <table>
                <thead>
                    <tr>
                        <th>Video</th>
                        <th>Date</th>
                        <th>Frames</th>
                        <th>Avg Velocity</th>
                        <th>Lock-offs</th>
                    </tr>
                </thead>
                <tbody>
                    ${analyses
                      .map(
                        (a) => `
                        <tr>
                            <td>${a.video?.filename || "Unknown"}</td>
                            <td>${new Date(a.created_at).toLocaleDateString()}</td>
                            <td>${a.total_frames || 0}</td>
                            <td>${(a.avg_velocity || 0).toFixed(3)} m/s</td>
                            <td>${a.lock_off_count || 0}</td>
                        </tr>
                    `,
                      )
                      .join("")}
                </tbody>
            </table>
        `;
  }

  function displayActiveGoals(goals) {
    const container = document.getElementById("activeGoalsList");

    if (goals.length === 0) {
      container.innerHTML =
        '<p style="color: #666; text-align: center;">No active goals. <a href="/goals">Set a goal</a> to track your progress!</p>';
      return;
    }

    container.innerHTML = goals
      .map((goal) => {
        const progress =
          goal.current_value && goal.target_value
            ? Math.min((goal.current_value / goal.target_value) * 100, 100)
            : 0;

        return `
                <div style="margin-bottom: 1.5rem;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                        <strong>${goal.metric_name}</strong>
                        <span>${goal.current_value || 0} / ${goal.target_value}</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${progress}%">
                            ${progress.toFixed(1)}%
                        </div>
                    </div>
                    ${goal.deadline ? `<small style="color: #666;">Due: ${new Date(goal.deadline).toLocaleDateString()}</small>` : ""}
                </div>
            `;
      })
      .join("");
  }

  // Load dashboard on page load
  loadDashboard();
</script>
{% endblock %}
