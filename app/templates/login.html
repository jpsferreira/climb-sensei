{% extends "base.html" %} {% block title %}Login - ClimbSensei{% endblock %} {%
block content %}
<div
  style="
    min-height: calc(100vh - 80px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  "
>
  <div style="width: 100%; max-width: 420px">
    <div class="fade-up" style="text-align: center; margin-bottom: 2rem">
      <div
        style="
          width: 56px;
          height: 56px;
          background: linear-gradient(135deg, var(--accent), var(--accent-dim));
          border-radius: var(--radius-lg);
          display: grid;
          place-items: center;
          margin: 0 auto 1rem;
          font-size: 1.5rem;
          box-shadow: 0 0 24px var(--accent-glow);
        "
      >
        &#9650;
      </div>
      <div
        style="
          font-family: var(--font-display);
          font-size: 1.5rem;
          font-weight: 700;
          color: var(--text-primary);
          letter-spacing: -0.03em;
        "
      >
        Climb<span style="color: var(--accent)">Sensei</span>
      </div>
    </div>

    <div
      class="card fade-up fade-up-delay-1"
      style="border-top: 3px solid var(--accent); margin-bottom: 0"
    >
      <div style="text-align: center; margin-bottom: 1.75rem">
        <h2 style="border: none; padding: 0; margin: 0; font-size: 1.35rem">
          Welcome back
        </h2>
        <p
          style="
            color: var(--text-muted);
            font-size: 0.88rem;
            margin-top: 0.25rem;
          "
        >
          Sign in to your ClimbSensei account
        </p>
      </div>

      <a
        href="/api/auth/google/authorize"
        class="btn btn-secondary"
        style="width: 100%; margin-bottom: 1.25rem; gap: 0.6rem"
      >
        <svg
          width="16"
          height="16"
          viewBox="0 0 18 18"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            d="M17.6 9.2l-.1-1.8H9v3.4h4.8C13.6 12 13 13 12 13.6v2.2h3a8.8 8.8 0 0 0 2.6-6.6z"
            fill="#4285F4"
          />
          <path
            d="M9 18c2.4 0 4.5-.8 6-2.2l-3-2.2a5.4 5.4 0 0 1-8-2.9H1V13a9 9 0 0 0 8 5z"
            fill="#34A853"
          />
          <path
            d="M4 10.7a5.4 5.4 0 0 1 0-3.4V5H1a9 9 0 0 0 0 8l3-2.3z"
            fill="#FBBC05"
          />
          <path
            d="M9 3.6c1.3 0 2.5.4 3.4 1.3L15 2.3A9 9 0 0 0 1 5l3 2.4a5.4 5.4 0 0 1 5-3.7z"
            fill="#EA4335"
          />
        </svg>
        Continue with Google
      </a>

      <div
        style="
          display: flex;
          align-items: center;
          gap: 1rem;
          margin: 1.25rem 0;
          color: var(--text-faint);
          font-size: 0.8rem;
          font-family: var(--font-display);
          text-transform: uppercase;
          letter-spacing: 0.08em;
        "
      >
        <div style="flex: 1; height: 1px; background: var(--border)"></div>
        or
        <div style="flex: 1; height: 1px; background: var(--border)"></div>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="you@example.com"
            required
            style="min-height: 44px"
          />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Your password"
            required
            style="min-height: 44px"
          />
        </div>
        <button type="submit" class="btn" style="width: 100%; min-height: 44px">
          Sign in
        </button>
      </form>

      <p
        style="
          text-align: center;
          margin-top: 1.5rem;
          color: var(--text-muted);
          font-size: 0.88rem;
        "
      >
        Don't have an account?
        <a
          href="/register"
          style="color: var(--accent); text-decoration: none; font-weight: 500"
          >Create one</a
        >
      </p>
    </div>
  </div>
</div>
{% endblock %} {% block extra_js %}
<script>
  if (authToken) {
    window.location.href = "/";
  }
  document.getElementById("loginForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const success = await login(email, password);
    if (success) {
      showAlert("Login successful!", "success");
      setTimeout(() => {
        window.location.href = "/";
      }, 800);
    } else {
      showAlert("Invalid email or password", "error");
    }
  });
</script>
{% endblock %}
