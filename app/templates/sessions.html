{% extends "base.html" %} {% block title %}Sessions - ClimbSensei{% endblock %}
{% block content %}
<div
  style="
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 2rem;
  "
>
  <h1>Climbing Sessions</h1>
  <button onclick="showCreateModal()" class="btn">+ New Session</button>
</div>

<div id="sessions-list">
  <p style="color: #666; text-align: center">Loading sessions...</p>
</div>

<!-- Create/Edit Session Modal -->
<div id="sessionModal" class="modal hidden">
  <div class="modal-content card" style="max-width: 500px; margin: 2rem auto">
    <h2 id="modalTitle">Create Session</h2>
    <form id="sessionForm">
      <input type="hidden" id="sessionId" />

      <div class="form-group">
        <label for="name">Session Name *</label>
        <input type="text" id="name" required />
      </div>

      <div class="form-group">
        <label for="date">Date *</label>
        <input type="date" id="date" required />
      </div>

      <div class="form-group">
        <label for="location">Location</label>
        <input type="text" id="location" />
      </div>

      <div class="form-group">
        <label for="notes">Notes</label>
        <textarea id="notes" rows="3"></textarea>
      </div>

      <div style="display: flex; gap: 1rem">
        <button type="submit" class="btn">Save</button>
        <button type="button" onclick="hideModal()" class="btn btn-secondary">
          Cancel
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %} {% block extra_css %}
<style>
  .modal {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.5);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .modal.hidden {
    display: none;
  }

  .session-card {
    background: white;
    padding: 1.5rem;
    border-radius: 8px;
    margin-bottom: 1rem;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
  }

  .session-header {
    display: flex;
    justify-content: space-between;
    align-items: start;
    margin-bottom: 1rem;
  }

  .session-actions {
    display: flex;
    gap: 0.5rem;
  }
</style>
{% endblock %} {% block extra_js %}
<script>
  // Require authentication
  if (!authToken) {
    window.location.href = "/login";
  }

  let sessions = [];

  async function loadSessions() {
    try {
      const response = await apiRequest(`${API_BASE}/sessions`);
      sessions = await response.json();
      displaySessions();
    } catch (error) {
      console.error("Failed to load sessions:", error);
      showAlert("Failed to load sessions", "error");
    }
  }

  function displaySessions() {
    const container = document.getElementById("sessions-list");

    if (sessions.length === 0) {
      container.innerHTML =
        '<div class="card"><p style="color: #666; text-align: center;">No sessions yet. Create your first session to get started!</p></div>';
      return;
    }

    container.innerHTML = sessions
      .map(
        (session) => `
            <div class="session-card">
                <div class="session-header">
                    <div>
                        <h3>${session.name}</h3>
                        <p style="color: #666; margin: 0.5rem 0;">
                            📅 ${new Date(session.date).toLocaleDateString()}
                            ${session.location ? `• 📍 ${session.location}` : ""}
                        </p>
                        ${session.notes ? `<p style="margin-top: 0.5rem;">${session.notes}</p>` : ""}
                    </div>
                    <div class="session-actions">
                        <button onclick="editSession(${session.id})" class="btn btn-secondary">Edit</button>
                        <button onclick="deleteSession(${session.id})" class="btn btn-danger">Delete</button>
                    </div>
                </div>
                <div>
                    <a href="#" onclick="viewSessionAnalyses(${session.id}); return false;" class="btn btn-secondary">
                        View Analyses (${session.analyses?.length || 0})
                    </a>
                </div>
            </div>
        `,
      )
      .join("");
  }

  function showCreateModal() {
    document.getElementById("modalTitle").textContent = "Create Session";
    document.getElementById("sessionForm").reset();
    document.getElementById("sessionId").value = "";
    document.getElementById("sessionModal").classList.remove("hidden");
  }

  function hideModal() {
    document.getElementById("sessionModal").classList.add("hidden");
  }

  async function editSession(id) {
    const session = sessions.find((s) => s.id === id);
    if (!session) return;

    document.getElementById("modalTitle").textContent = "Edit Session";
    document.getElementById("sessionId").value = session.id;
    document.getElementById("name").value = session.name;
    document.getElementById("date").value = session.date;
    document.getElementById("location").value = session.location || "";
    document.getElementById("notes").value = session.notes || "";
    document.getElementById("sessionModal").classList.remove("hidden");
  }

  async function deleteSession(id) {
    if (!confirm("Are you sure you want to delete this session?")) return;

    try {
      const response = await apiRequest(`${API_BASE}/sessions/${id}`, {
        method: "DELETE",
      });

      if (response.ok) {
        showAlert("Session deleted successfully", "success");
        loadSessions();
      } else {
        throw new Error("Failed to delete session");
      }
    } catch (error) {
      showAlert(error.message, "error");
    }
  }

  async function viewSessionAnalyses(id) {
    try {
      const response = await apiRequest(`${API_BASE}/sessions/${id}/analyses`);
      const analyses = await response.json();

      if (analyses.length === 0) {
        showAlert("No analyses in this session yet", "info");
        return;
      }

      // Navigate to dashboard with filter (simplified for now)
      showAlert(`This session has ${analyses.length} analyses`, "info");
    } catch (error) {
      showAlert("Failed to load session analyses", "error");
    }
  }

  document
    .getElementById("sessionForm")
    .addEventListener("submit", async (e) => {
      e.preventDefault();

      const id = document.getElementById("sessionId").value;
      const data = {
        name: document.getElementById("name").value,
        date: document.getElementById("date").value,
        location: document.getElementById("location").value || null,
        notes: document.getElementById("notes").value || null,
      };

      try {
        const url = id ? `${API_BASE}/sessions/${id}` : `${API_BASE}/sessions`;
        const method = id ? "PATCH" : "POST";

        const response = await apiRequest(url, {
          method: method,
          body: JSON.stringify(data),
        });

        if (response.ok) {
          showAlert(
            `Session ${id ? "updated" : "created"} successfully`,
            "success",
          );
          hideModal();
          loadSessions();
        } else {
          throw new Error(`Failed to ${id ? "update" : "create"} session`);
        }
      } catch (error) {
        showAlert(error.message, "error");
      }
    });

  // Load sessions on page load
  loadSessions();
</script>
{% endblock %}
