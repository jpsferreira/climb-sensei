{% extends "base.html" %} {% block title %}Sessions - ClimbSensei{% endblock %}
{% block content %}
<div
  class="flex justify-between items-center fade-up"
  style="margin-bottom: 1.5rem"
>
  <div class="page-header" style="margin-bottom: 0">
    <h1>Sessions</h1>
    <p>Your climbing calendar</p>
  </div>
  <button class="btn" onclick="showCreateModal()">New Session</button>
</div>

<div class="card fade-up fade-up-delay-1">
  <!-- Month navigation -->
  <div class="calendar-nav">
    <button onclick="prevMonth()" aria-label="Previous month">&#8249;</button>
    <span class="calendar-month" id="calendarMonthLabel"></span>
    <button onclick="nextMonth()" aria-label="Next month">&#8250;</button>
  </div>

  <!-- Calendar grid -->
  <div class="calendar-grid" id="calendarGrid">
    <div class="calendar-day-header">M</div>
    <div class="calendar-day-header">T</div>
    <div class="calendar-day-header">W</div>
    <div class="calendar-day-header">T</div>
    <div class="calendar-day-header">F</div>
    <div class="calendar-day-header">S</div>
    <div class="calendar-day-header">S</div>
  </div>

  <!-- Day detail -->
  <div class="day-detail" id="dayDetail" style="display: none">
    <div
      style="height: 1px; background: var(--border); margin-bottom: 16px"
    ></div>
    <div class="day-detail-header" id="dayDetailHeader"></div>
    <div id="dayDetailContent"></div>
  </div>
</div>

<!-- Create / Edit Session Modal -->
<div id="sessionModal" class="modal hidden">
  <div class="modal-content">
    <h2 id="modalTitle">Create Session</h2>
    <form id="sessionForm">
      <input type="hidden" id="editSessionId" value="" />
      <div class="form-group">
        <label for="sessionName">Session name</label>
        <input
          type="text"
          id="sessionName"
          placeholder="Morning bouldering"
          required
        />
      </div>
      <div class="form-group">
        <label for="sessionDate">Date</label>
        <input type="date" id="sessionDate" required />
      </div>
      <div class="form-group">
        <label for="sessionLocation">Location</label>
        <input
          type="text"
          id="sessionLocation"
          placeholder="Gym or crag name"
        />
      </div>
      <div class="form-group">
        <label for="sessionNotes">Notes</label>
        <textarea
          id="sessionNotes"
          rows="3"
          placeholder="How did it go?"
        ></textarea>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-secondary" onclick="hideModal()">
          Cancel
        </button>
        <button type="submit" class="btn">Save</button>
      </div>
    </form>
  </div>
</div>
{% endblock %} {% block extra_css %}
<style>
  /* ── Calendar Navigation ─────────────────────────────── */
  .calendar-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    padding: 0 4px;
  }
  .calendar-nav button {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 1.4rem;
    cursor: pointer;
    padding: 8px 12px;
    border-radius: var(--radius-sm);
    line-height: 1;
    transition:
      color 0.2s,
      background 0.2s;
  }
  .calendar-nav button:hover {
    color: var(--text-primary);
    background: var(--bg-hover);
  }
  .calendar-month {
    font-family: var(--font-display);
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--text-primary);
  }

  /* ── Calendar Grid ───────────────────────────────────── */
  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
    text-align: center;
  }
  .calendar-day-header {
    font-family: var(--font-display);
    font-size: 0.65rem;
    color: var(--text-muted);
    padding: 8px 0;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .calendar-day {
    padding: 8px 4px;
    font-size: 0.8rem;
    font-family: var(--font-display);
    border-radius: 8px;
    cursor: pointer;
    position: relative;
    min-height: 36px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text-secondary);
    transition: background 0.15s;
    user-select: none;
  }
  .calendar-day:hover {
    background: var(--bg-hover);
  }
  .calendar-day.today {
    background: var(--accent);
    color: #000;
    font-weight: 700;
  }
  .calendar-day.today:hover {
    background: var(--accent-bright);
  }
  .calendar-day.selected {
    outline: 2px solid var(--accent);
    outline-offset: -2px;
  }
  .calendar-day.today.selected {
    outline: 2px solid #000;
  }
  .calendar-day.has-session::after {
    content: "";
    width: 5px;
    height: 5px;
    background: var(--accent);
    border-radius: 50%;
    position: absolute;
    bottom: 3px;
  }
  .calendar-day.today.has-session::after {
    background: #000;
  }
  .calendar-day.other-month {
    color: var(--text-faint);
    opacity: 0.4;
  }
  .calendar-day.other-month.has-session::after {
    opacity: 0.5;
  }

  /* ── Day Detail ──────────────────────────────────────── */
  .day-detail {
    margin-top: 4px;
  }
  .day-detail-header {
    font-family: var(--font-display);
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 12px;
  }
  .day-detail-empty {
    color: var(--text-muted);
    font-size: 0.82rem;
    text-align: center;
    padding: 20px;
  }
  .day-detail-empty .empty-hint {
    margin-top: 8px;
    font-size: 0.75rem;
    opacity: 0.7;
  }

  /* ── Session Detail Card ─────────────────────────────── */
  .session-detail-card {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem;
    margin-bottom: 0.75rem;
  }
  .session-detail-title {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 0.92rem;
    color: var(--text-primary);
    margin-bottom: 6px;
  }
  .session-detail-meta {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    font-size: 0.78rem;
    color: var(--text-muted);
    margin-bottom: 8px;
  }
  .session-detail-meta span {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .session-detail-notes {
    font-size: 0.82rem;
    color: var(--text-secondary);
    font-style: italic;
    margin-top: 6px;
    line-height: 1.5;
  }
  .session-detail-actions {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }

  /* ── Inline edit fields ──────────────────────────────── */
  .inline-edit-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }
  .inline-edit-row label {
    font-size: 0.75rem;
    color: var(--text-muted);
    min-width: 56px;
    font-family: var(--font-display);
  }
  .inline-edit-field {
    flex: 1;
    background: var(--bg-base);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-primary);
    font-size: 0.82rem;
    font-family: var(--font-body);
    padding: 5px 8px;
    transition: border-color 0.2s;
  }
  .inline-edit-field:focus {
    outline: none;
    border-color: var(--accent);
  }
  .inline-save-btn {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: var(--radius-sm);
    padding: 5px 10px;
    font-size: 0.75rem;
    font-family: var(--font-display);
    font-weight: 600;
    cursor: pointer;
    transition: filter 0.2s;
  }
  .inline-save-btn:hover {
    filter: brightness(1.1);
  }
</style>
{% endblock %} {% block extra_js %}
<script>
  if (!authToken) {
    window.location.href = "/login";
  }

  const MONTH_NAMES = [
    "January",
    "February",
    "March",
    "April",
    "May",
    "June",
    "July",
    "August",
    "September",
    "October",
    "November",
    "December",
  ];

  let currentMonth = new Date().getMonth();
  let currentYear = new Date().getFullYear();
  let sessions = [];
  let selectedDate = null; // ISO date string 'YYYY-MM-DD'

  // ── Data loading ──────────────────────────────────────────

  async function loadSessions() {
    try {
      const res = await apiRequest(`${API_BASE}/sessions`);
      if (!res.ok) return;
      sessions = await res.json();
      renderCalendar();
    } catch (err) {
      console.error("Failed to load sessions:", err);
    }
  }

  // Returns the ISO date string for a session (handles datetime strings)
  function sessionDateKey(session) {
    return session.date ? session.date.split("T")[0] : null;
  }

  // Returns a Set of 'YYYY-MM-DD' strings that have sessions
  function buildSessionDateSet() {
    const s = new Set();
    sessions.forEach((sess) => {
      const key = sessionDateKey(sess);
      if (key) s.add(key);
    });
    return s;
  }

  // ── Calendar rendering ────────────────────────────────────

  function renderCalendar() {
    document.getElementById("calendarMonthLabel").textContent =
      `${MONTH_NAMES[currentMonth]} ${currentYear}`;

    const sessionDates = buildSessionDateSet();
    const today = new Date();
    const todayKey = isoDate(
      today.getFullYear(),
      today.getMonth(),
      today.getDate(),
    );

    // First day of the month (0=Sun … 6=Sat → convert to Mon-based: 0=Mon … 6=Sun)
    const firstDay = new Date(currentYear, currentMonth, 1);
    let startOffset = firstDay.getDay(); // 0=Sun
    startOffset = startOffset === 0 ? 6 : startOffset - 1; // Mon-based

    const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
    const daysInPrevMonth = new Date(currentYear, currentMonth, 0).getDate();

    const grid = document.getElementById("calendarGrid");

    // Keep the 7 header cells, replace day cells
    const headers = Array.from(grid.querySelectorAll(".calendar-day-header"));
    grid.innerHTML = "";
    headers.forEach((h) => grid.appendChild(h));

    // Leading cells from previous month
    for (let i = 0; i < startOffset; i++) {
      const day = daysInPrevMonth - startOffset + 1 + i;
      const prevMonth = currentMonth === 0 ? 11 : currentMonth - 1;
      const prevYear = currentMonth === 0 ? currentYear - 1 : currentYear;
      const dateKey = isoDate(prevYear, prevMonth, day);
      grid.appendChild(makeDayCell(day, dateKey, sessionDates, todayKey, true));
    }

    // Current month cells
    for (let d = 1; d <= daysInMonth; d++) {
      const dateKey = isoDate(currentYear, currentMonth, d);
      grid.appendChild(makeDayCell(d, dateKey, sessionDates, todayKey, false));
    }

    // Trailing cells from next month
    const totalCells = startOffset + daysInMonth;
    const trailingCount = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
    for (let d = 1; d <= trailingCount; d++) {
      const nextMonth = currentMonth === 11 ? 0 : currentMonth + 1;
      const nextYear = currentMonth === 11 ? currentYear + 1 : currentYear;
      const dateKey = isoDate(nextYear, nextMonth, d);
      grid.appendChild(makeDayCell(d, dateKey, sessionDates, todayKey, true));
    }

    // Re-render day detail if a date is selected
    if (selectedDate) {
      renderDayDetail(selectedDate);
    }
  }

  function makeDayCell(dayNum, dateKey, sessionDates, todayKey, isOtherMonth) {
    const cell = document.createElement("div");
    cell.className = "calendar-day";
    cell.textContent = dayNum;
    cell.dataset.date = dateKey;

    if (isOtherMonth) cell.classList.add("other-month");
    if (dateKey === todayKey) cell.classList.add("today");
    if (sessionDates.has(dateKey)) cell.classList.add("has-session");
    if (dateKey === selectedDate) cell.classList.add("selected");

    cell.addEventListener("click", () => selectDay(dateKey));
    return cell;
  }

  function isoDate(year, month, day) {
    return `${year}-${String(month + 1).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
  }

  // ── Day selection ─────────────────────────────────────────

  function selectDay(dateKey) {
    // Deselect previous
    document
      .querySelectorAll(".calendar-day.selected")
      .forEach((el) => el.classList.remove("selected"));

    // Toggle off if same day clicked again
    if (selectedDate === dateKey) {
      selectedDate = null;
      document.getElementById("dayDetail").style.display = "none";
      return;
    }

    selectedDate = dateKey;

    // Highlight selected cell
    const cell = document.querySelector(
      `.calendar-day[data-date="${dateKey}"]`,
    );
    if (cell) cell.classList.add("selected");

    renderDayDetail(dateKey);
  }

  function renderDayDetail(dateKey) {
    const detailEl = document.getElementById("dayDetail");
    const headerEl = document.getElementById("dayDetailHeader");
    const contentEl = document.getElementById("dayDetailContent");

    detailEl.style.display = "block";

    // Format the date heading
    const [y, m, d] = dateKey.split("-").map(Number);
    const dateObj = new Date(y, m - 1, d);
    const formatted = dateObj.toLocaleDateString("en-GB", {
      weekday: "long",
      day: "numeric",
      month: "long",
      year: "numeric",
    });
    headerEl.textContent = formatted;

    const daySessions = sessions.filter((s) => sessionDateKey(s) === dateKey);

    if (daySessions.length === 0) {
      contentEl.innerHTML = `
        <div class="day-detail-empty">
          <div>No climbing this day</div>
          <div class="empty-hint">
            <button class="btn btn-sm btn-secondary" onclick="showCreateModalForDate('${dateKey}')">
              + Log a session
            </button>
          </div>
        </div>`;
      return;
    }

    contentEl.innerHTML = daySessions.map((s) => renderSessionCard(s)).join("");
  }

  function renderSessionCard(s) {
    const videos =
      s.total_videos != null ? s.total_videos : s.analyses_count ?? 0;
    const score =
      s.avg_performance_score != null
        ? `<span title="Avg performance">&#9733; ${(s.avg_performance_score * 100).toFixed(0)}%</span>`
        : "";

    return `
      <div class="session-detail-card" id="session-card-${s.id}">
        <div class="session-detail-title">${escapeHtml(s.name)}</div>
        <div class="session-detail-meta">
          ${videos > 0 ? `<span>&#127910; ${videos} video${videos !== 1 ? "s" : ""}</span>` : ""}
          ${score}
        </div>
        <div class="inline-edit-row">
          <label>Location</label>
          <input class="inline-edit-field" id="loc-${s.id}" type="text"
            value="${escapeHtml(s.location || "")}" placeholder="Add location…" />
        </div>
        <div class="inline-edit-row">
          <label>Notes</label>
          <input class="inline-edit-field" id="notes-${s.id}" type="text"
            value="${escapeHtml(s.notes || "")}" placeholder="Add notes…" />
        </div>
        <div style="display:flex; gap:8px; margin-top:10px; flex-wrap:wrap;">
          <button class="inline-save-btn" onclick="saveSessionMeta(${s.id})">Save</button>
          <button class="btn btn-sm btn-secondary" onclick="editSession(${s.id})">Edit all</button>
          <button class="btn btn-sm btn-danger" onclick="deleteSession(${s.id})">Delete</button>
        </div>
      </div>`;
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  // ── Inline metadata save ──────────────────────────────────

  async function saveSessionMeta(id) {
    const location = document.getElementById(`loc-${id}`).value.trim() || null;
    const notes = document.getElementById(`notes-${id}`).value.trim() || null;
    try {
      const res = await apiRequest(`${API_BASE}/sessions/${id}`, {
        method: "PATCH",
        body: JSON.stringify({ location, notes }),
      });
      if (res.ok) {
        // Update local cache
        const idx = sessions.findIndex((s) => s.id === id);
        if (idx !== -1) {
          sessions[idx].location = location;
          sessions[idx].notes = notes;
        }
        showAlert("Session updated", "success");
      } else {
        const err = await res.json();
        showAlert(err.detail || "Failed to save", "error");
      }
    } catch (err) {
      showAlert("Failed to save session", "error");
    }
  }

  // ── Month navigation ──────────────────────────────────────

  function prevMonth() {
    if (currentMonth === 0) {
      currentMonth = 11;
      currentYear--;
    } else {
      currentMonth--;
    }
    renderCalendar();
  }

  function nextMonth() {
    if (currentMonth === 11) {
      currentMonth = 0;
      currentYear++;
    } else {
      currentMonth++;
    }
    renderCalendar();
  }

  // ── Modal helpers ─────────────────────────────────────────

  function showCreateModal() {
    document.getElementById("modalTitle").textContent = "Create Session";
    document.getElementById("editSessionId").value = "";
    document.getElementById("sessionForm").reset();
    document.getElementById("sessionDate").value = new Date()
      .toISOString()
      .split("T")[0];
    document.getElementById("sessionModal").classList.remove("hidden");
  }

  function showCreateModalForDate(dateKey) {
    showCreateModal();
    document.getElementById("sessionDate").value = dateKey;
  }

  function hideModal() {
    document.getElementById("sessionModal").classList.add("hidden");
  }

  function editSession(id) {
    const session = sessions.find((s) => s.id === id);
    if (!session) return;
    document.getElementById("modalTitle").textContent = "Edit Session";
    document.getElementById("editSessionId").value = id;
    document.getElementById("sessionName").value = session.name;
    document.getElementById("sessionDate").value = session.date
      ? session.date.split("T")[0]
      : "";
    document.getElementById("sessionLocation").value = session.location || "";
    document.getElementById("sessionNotes").value = session.notes || "";
    document.getElementById("sessionModal").classList.remove("hidden");
  }

  async function deleteSession(id) {
    if (!confirm("Delete this session?")) return;
    try {
      await apiRequest(`${API_BASE}/sessions/${id}`, { method: "DELETE" });
      sessions = sessions.filter((s) => s.id !== id);
      showAlert("Session deleted", "success");
      renderCalendar();
      if (selectedDate) renderDayDetail(selectedDate);
    } catch (err) {
      showAlert("Failed to delete session", "error");
    }
  }

  // ── Form submit ───────────────────────────────────────────

  document
    .getElementById("sessionForm")
    .addEventListener("submit", async (e) => {
      e.preventDefault();
      const id = document.getElementById("editSessionId").value;
      const data = {
        name: document.getElementById("sessionName").value,
        date: document.getElementById("sessionDate").value,
        location: document.getElementById("sessionLocation").value || null,
        notes: document.getElementById("sessionNotes").value || null,
      };

      try {
        const url = id ? `${API_BASE}/sessions/${id}` : `${API_BASE}/sessions`;
        const method = id ? "PATCH" : "POST";
        const res = await apiRequest(url, {
          method,
          body: JSON.stringify(data),
        });
        if (res.ok) {
          hideModal();
          showAlert(id ? "Session updated" : "Session created", "success");
          await loadSessions();
          // Auto-select the saved session's date
          if (data.date) selectDay(data.date);
        } else {
          const err = await res.json();
          showAlert(err.detail || "Failed to save", "error");
        }
      } catch (err) {
        showAlert("Failed to save session", "error");
      }
    });

  // ── Init ──────────────────────────────────────────────────
  loadSessions();
</script>
{% endblock %}
