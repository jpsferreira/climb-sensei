{% extends "base.html" %} {% block title %}Register - ClimbSensei{% endblock %}
{% block content %}
<div style="max-width: 400px; margin: 4rem auto">
  <div class="card">
    <h2 style="text-align: center; margin-bottom: 2rem">🧗 Create Account</h2>

    <!-- Google OAuth Button -->
    <a
      href="/api/auth/google/authorize"
      class="btn"
      style="
        width: 100%;
        background: #4285f4;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        margin-bottom: 1.5rem;
        text-decoration: none;
      "
    >
      <svg width="18" height="18" xmlns="http://www.w3.org/2000/svg">
        <g fill="none" fill-rule="evenodd">
          <path
            d="M17.6 9.2l-.1-1.8H9v3.4h4.8C13.6 12 13 13 12 13.6v2.2h3a8.8 8.8 0 0 0 2.6-6.6z"
            fill="#4285F4"
          />
          <path
            d="M9 18c2.4 0 4.5-.8 6-2.2l-3-2.2a5.4 5.4 0 0 1-8-2.9H1V13a9 9 0 0 0 8 5z"
            fill="#34A853"
          />
          <path
            d="M4 10.7a5.4 5.4 0 0 1 0-3.4V5H1a9 9 0 0 0 0 8l3-2.3z"
            fill="#FBBC05"
          />
          <path
            d="M9 3.6c1.3 0 2.5.4 3.4 1.3L15 2.3A9 9 0 0 0 1 5l3 2.4a5.4 5.4 0 0 1 5-3.7z"
            fill="#EA4335"
          />
        </g>
      </svg>
      Sign up with Google
    </a>

    <div
      style="
        text-align: center;
        margin: 1.5rem 0;
        color: #666;
        position: relative;
      "
    >
      <span
        style="
          background: white;
          padding: 0 1rem;
          position: relative;
          z-index: 1;
        "
        >OR</span
      >
      <div
        style="
          position: absolute;
          top: 50%;
          left: 0;
          right: 0;
          height: 1px;
          background: #ddd;
          z-index: 0;
        "
      ></div>
    </div>

    <form id="registerForm">
      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required />
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          required
          minlength="6"
        />
        <small style="color: #666">At least 6 characters</small>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input
          type="password"
          id="confirmPassword"
          name="confirmPassword"
          required
        />
      </div>

      <button type="submit" class="btn" style="width: 100%">Register</button>
    </form>

    <p style="text-align: center; margin-top: 1.5rem; color: #666">
      Already have an account? <a href="/login">Login</a>
    </p>
  </div>
</div>
{% endblock %} {% block extra_js %}
<script>
  // Redirect if already logged in
  if (authToken) {
    window.location.href = "/dashboard";
  }

  document
    .getElementById("registerForm")
    .addEventListener("submit", async (e) => {
      e.preventDefault();

      const name = document.getElementById("name").value;
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const confirmPassword = document.getElementById("confirmPassword").value;

      if (password !== confirmPassword) {
        showAlert("Passwords do not match", "error");
        return;
      }

      try {
        const response = await fetch(`${API_BASE}/auth/register`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({ name, email, password }),
        });

        if (!response.ok) {
          const error = await response.json();
          throw new Error(error.detail || "Registration failed");
        }

        showAlert("Registration successful! Logging you in...", "success");

        // Auto-login
        const loginSuccess = await login(email, password);

        if (loginSuccess) {
          setTimeout(() => {
            window.location.href = "/dashboard";
          }, 1000);
        } else {
          setTimeout(() => {
            window.location.href = "/login";
          }, 1500);
        }
      } catch (error) {
        showAlert(error.message, "error");
      }
    });
</script>
{% endblock %}
