{% extends "base.html" %} {% block title %}Route Detail - ClimbSensei{% endblock
%} {% block extra_css %}
<style>
  .back-link {
    display: inline-block;
    color: var(--text-muted);
    text-decoration: none;
    font-size: 0.82rem;
    font-family: var(--font-display);
    margin-bottom: 10px;
    transition: color 0.2s;
  }
  .back-link:hover {
    color: var(--accent);
  }

  .route-header {
    padding: 20px 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 20px;
  }
  .route-title-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
  }
  .route-title {
    font-size: 1.3rem;
    font-weight: 700;
    font-family: var(--font-display);
  }
  .route-subtitle {
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-top: 4px;
  }
  .quick-stats {
    display: flex;
    gap: 20px;
    margin-top: 14px;
    flex-wrap: wrap;
  }
  .quick-stat-label {
    font-size: 0.6rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .quick-stat-value {
    font-size: 1rem;
    font-weight: 700;
    margin-top: 2px;
    font-family: var(--font-display);
  }
  .status-badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 0.7rem;
    font-weight: 600;
    font-family: var(--font-display);
  }
  .status-projecting {
    background: var(--accent);
    color: #000;
  }
  .status-sent {
    background: var(--success);
    color: #000;
  }

  .chart-section {
    margin-bottom: 24px;
  }
  .chart-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .chart-header h2 {
    font-family: var(--font-display);
    font-size: 1rem;
    font-weight: 600;
    border: none;
    padding: 0;
    margin: 0;
  }
  .metric-select {
    background: var(--bg-raised);
    color: var(--teal);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 0.75rem;
    font-family: "DM Sans", sans-serif;
  }
  .chart-container {
    background: var(--bg-raised);
    border-radius: 12px;
    padding: 16px;
    height: 220px;
  }

  .section-title {
    font-family: var(--font-display);
    font-size: 1rem;
    font-weight: 600;
    margin-bottom: 12px;
  }

  .timeline {
    position: relative;
    padding-left: 24px;
    margin-left: 8px;
  }
  .timeline::before {
    content: "";
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 2px;
    background: var(--border);
  }
  .timeline-item {
    position: relative;
    margin-bottom: 14px;
  }
  .timeline-dot {
    position: absolute;
    left: -29px;
    top: 8px;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--border);
  }
  .timeline-item:first-child .timeline-dot {
    background: var(--accent);
  }
  .timeline-card {
    background: var(--bg-raised);
    border-radius: 10px;
    padding: 12px;
  }
  .timeline-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .attempt-num {
    font-size: 0.85rem;
    font-weight: 600;
    font-family: var(--font-display);
  }
  .attempt-date {
    font-size: 0.7rem;
    color: var(--text-muted);
  }
  .attempt-metrics {
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-top: 6px;
  }
  .attempt-video-link {
    font-size: 0.7rem;
    color: var(--teal);
    margin-top: 6px;
    display: inline-block;
    text-decoration: none;
  }
  .attempt-video-link:hover {
    text-decoration: underline;
  }

  .action-bar {
    display: flex;
    gap: 8px;
    margin-top: 14px;
  }

  /* ─── Metric Insights Panel ──────────────────────────── */
  .insights-panel {
    display: flex;
    gap: 10px;
    margin-top: 12px;
    flex-wrap: wrap;
  }
  .insight-card {
    background: var(--bg-raised);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    flex: 1;
    min-width: 140px;
  }
  .insight-label {
    font-size: 0.65rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-family: var(--font-display);
    margin-bottom: 4px;
  }
  .insight-value {
    font-size: 1.05rem;
    font-weight: 700;
    font-family: var(--font-display);
  }
  .insight-sub {
    font-size: 0.7rem;
    color: var(--text-muted);
    margin-top: 2px;
  }
  .trend-up {
    color: var(--success);
  }
  .trend-down {
    color: var(--error);
  }
  .trend-flat {
    color: var(--text-muted);
  }
  .trend-arrow {
    font-size: 0.85em;
    margin-right: 2px;
  }

  /* ─── Attempt delta badges ───────────────────────────── */
  .attempt-delta {
    display: inline-flex;
    align-items: center;
    gap: 2px;
    font-size: 0.68rem;
    font-weight: 600;
    font-family: var(--font-display);
    padding: 2px 6px;
    border-radius: 4px;
    margin-left: 6px;
  }
  .delta-positive {
    background: var(--success-bg);
    color: var(--success);
  }
  .delta-negative {
    background: var(--error-bg);
    color: var(--error);
  }
  .delta-neutral {
    background: var(--bg-surface);
    color: var(--text-muted);
  }

  .goals-section {
    margin-top: 24px;
  }
  .goal-item {
    background: var(--bg-raised);
    border-radius: 10px;
    padding: 12px;
    margin-bottom: 10px;
  }
  .goal-item-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.82rem;
    font-family: var(--font-display);
    font-weight: 500;
    margin-bottom: 6px;
  }
  .goal-item-target {
    font-size: 0.72rem;
    color: var(--text-muted);
  }

  @media (max-width: 768px) {
    .route-title-row {
      flex-direction: column;
    }
    .quick-stats {
      gap: 14px;
    }
    .chart-header {
      flex-direction: column;
      align-items: flex-start;
      gap: 8px;
    }
  }
</style>

{% endblock %} {% block extra_js %}
<script>
  const routeId = {{ route_id }};
  let routeData = null;
  let chart = null;
  let currentMetric = 'avg_velocity';

  if (!authToken) {
      window.location.href = '/login';
  }

  async function loadRoute() {
      const res = await apiRequest(`/api/routes/${routeId}`);
      if (!res.ok) { window.location.href = '/'; return; }
      routeData = await res.json();
      renderRouteHeader();
      loadAttempts();
      loadChart();
      loadGoals();
  }

  function renderRouteHeader() {
      const r = routeData;
      const statusClass = r.status === 'sent' ? 'status-sent' : 'status-projecting';
      const statusLabel = r.status === 'sent' ? 'Sent' : 'Projecting';
      const firstAttempt = r.first_attempt_date ? new Date(r.first_attempt_date).toLocaleDateString() : '-';
      const lastAttempt = r.last_attempt_date ? new Date(r.last_attempt_date).toLocaleDateString() : '-';
      const typeLabel = r.type ? r.type.charAt(0).toUpperCase() + r.type.slice(1).replace('_', ' ') : '';

      const container = document.getElementById('route-header-section');
      container.innerHTML = `
          <div class="route-title-row">
              <div>
                  <div class="flex items-center" style="gap: 10px;">
                      <span class="route-title">${escapeHtml(r.name)}</span>
                      ${r.grade ? `<span class="badge badge-warning">${escapeHtml(r.grade)}</span>` : ''}
                  </div>
                  <div class="route-subtitle">
                      ${r.location ? escapeHtml(r.location) : ''}${r.location && typeLabel ? ' &middot; ' : ''}${escapeHtml(typeLabel)}
                  </div>
              </div>
              <span class="status-badge ${statusClass}">${statusLabel}</span>
          </div>
          <div class="quick-stats">
              <div>
                  <div class="quick-stat-label">Attempts</div>
                  <div class="quick-stat-value">${r.attempt_count || 0}</div>
              </div>
              <div>
                  <div class="quick-stat-label">First attempt</div>
                  <div class="quick-stat-value">${firstAttempt}</div>
              </div>
              <div>
                  <div class="quick-stat-label">Last attempt</div>
                  <div class="quick-stat-value">${lastAttempt}</div>
              </div>
          </div>
          <div class="action-bar">
              <a href="/upload?route_id=${r.id}" class="btn btn-sm">Add Attempt</a>
              <button class="btn btn-sm btn-secondary" onclick="openEditModal()">Edit</button>
              <button class="btn btn-sm btn-danger" onclick="deleteRoute()">Delete</button>
          </div>
      `;
  }

  async function loadAttempts() {
      const res = await apiRequest(`/api/routes/${routeId}/attempts`);
      if (!res.ok) return;
      const attempts = await res.json();
      renderTimeline(attempts);
  }

  function formatDelta(curr, prev, lowerBetter) {
      if (curr == null || prev == null) return '';
      const d = curr - prev;
      if (Math.abs(d) < 0.001) return '<span class="attempt-delta delta-neutral">→ 0</span>';
      const improved = lowerBetter ? d < 0 : d > 0;
      const cls = improved ? 'delta-positive' : 'delta-negative';
      const arrow = improved ? '↑' : '↓';
      return `<span class="attempt-delta ${cls}">${arrow} ${Math.abs(d).toFixed(2)}</span>`;
  }

  function renderTimeline(attempts) {
      const container = document.getElementById('timeline');
      if (attempts.length === 0) {
          container.innerHTML = '<div class="empty-state">' +
              '<div class="empty-state-icon"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg></div>' +
              '<div class="empty-state-title">No attempts yet</div>' +
              '<div class="empty-state-desc">Upload a climbing video to analyze your technique and track progress.</div>' +
              '<a href="/upload?route_id=' + routeId + '" class="btn btn-sm">Upload first attempt</a></div>';
          container.classList.remove('timeline');
          return;
      }
      container.classList.add('timeline');
      // attempts are newest-first; the "previous" for display is the next element
      container.innerHTML = attempts.map((a, i) => {
          const prev = i < attempts.length - 1 ? attempts[i + 1] : null;
          const velDelta = prev ? formatDelta(a.avg_velocity, prev.avg_velocity, false) : '';
          const swayDelta = prev ? formatDelta(a.avg_sway, prev.avg_sway, true) : '';
          const econDelta = prev ? formatDelta(a.avg_movement_economy, prev.avg_movement_economy, false) : '';
          return `
          <div class="timeline-item">
              <div class="timeline-dot"></div>
              <div class="timeline-card">
                  <div class="timeline-header">
                      <span class="attempt-num">Attempt #${attempts.length - i}</span>
                      <span class="attempt-date">${new Date(a.date).toLocaleDateString()}</span>
                  </div>
                  <div class="attempt-metrics">
                      ${a.avg_velocity != null ? 'Vel: ' + a.avg_velocity.toFixed(2) + velDelta : ''}
                      ${a.avg_sway != null ? ' &middot; Sway: ' + a.avg_sway.toFixed(2) + swayDelta : ''}
                      ${a.avg_movement_economy != null ? ' &middot; Economy: ' + a.avg_movement_economy.toFixed(2) + econDelta : ''}
                  </div>
                  ${a.has_video ? `<a href="/routes/${routeId}/attempts/${a.id}" class="attempt-video-link">&#9654; View details</a>` : `<a href="/routes/${routeId}/attempts/${a.id}" class="attempt-video-link">View details</a>`}
              </div>
          </div>`;
      }).join('');
  }

  async function loadChart() {
      const res = await apiRequest(`/api/routes/${routeId}/progress/${currentMetric}`);
      if (!res.ok) return;
      const data = await res.json();
      renderChart(data);
  }

  // Metrics where lower is better (used for trend direction coloring)
  const LOWER_IS_BETTER = new Set(['avg_sway', 'fatigue_score']);

  function metricDisplayName(key) {
      return key.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
  }

  function renderInsights(data) {
      const panel = document.getElementById('insights-panel');
      if (!data.data || data.data.length < 2) {
          panel.style.display = 'none';
          return;
      }

      const values = data.data.map(d => d.value);
      const latest = values[values.length - 1];
      const prev = values[values.length - 2];
      const first = values[0];
      const lowerBetter = LOWER_IS_BETTER.has(data.metric);

      // Last attempt change
      const lastDelta = latest - prev;
      const lastPct = prev !== 0 ? ((lastDelta / Math.abs(prev)) * 100) : 0;
      const lastImproved = lowerBetter ? lastDelta < 0 : lastDelta > 0;
      const lastClass = Math.abs(lastPct) < 1 ? 'trend-flat' : (lastImproved ? 'trend-up' : 'trend-down');
      const lastArrow = Math.abs(lastPct) < 1 ? '→' : (lastImproved ? '↑' : '↓');

      // Overall change (first → last)
      const overallDelta = latest - first;
      const overallPct = first !== 0 ? ((overallDelta / Math.abs(first)) * 100) : 0;
      const overallImproved = lowerBetter ? overallDelta < 0 : overallDelta > 0;
      const overallClass = Math.abs(overallPct) < 1 ? 'trend-flat' : (overallImproved ? 'trend-up' : 'trend-down');
      const overallArrow = Math.abs(overallPct) < 1 ? '→' : (overallImproved ? '↑' : '↓');

      // Best value
      const best = lowerBetter ? Math.min(...values) : Math.max(...values);
      const bestIdx = values.indexOf(best);
      const bestDate = new Date(data.data[bestIdx].date).toLocaleDateString();

      // Average
      const avg = values.reduce((a, b) => a + b, 0) / values.length;

      panel.style.display = 'flex';
      panel.innerHTML = `
          <div class="insight-card">
              <div class="insight-label">Last attempt</div>
              <div class="insight-value ${lastClass}">
                  <span class="trend-arrow">${lastArrow}</span>${Math.abs(lastPct).toFixed(1)}%
              </div>
              <div class="insight-sub">${lastDelta >= 0 ? '+' : ''}${lastDelta.toFixed(3)} vs previous</div>
          </div>
          <div class="insight-card">
              <div class="insight-label">Overall (${values.length} attempts)</div>
              <div class="insight-value ${overallClass}">
                  <span class="trend-arrow">${overallArrow}</span>${Math.abs(overallPct).toFixed(1)}%
              </div>
              <div class="insight-sub">${overallDelta >= 0 ? '+' : ''}${overallDelta.toFixed(3)} since first</div>
          </div>
          <div class="insight-card">
              <div class="insight-label">Best</div>
              <div class="insight-value" style="color: var(--accent);">${best.toFixed(3)}</div>
              <div class="insight-sub">${bestDate}</div>
          </div>
          <div class="insight-card">
              <div class="insight-label">Average</div>
              <div class="insight-value">${avg.toFixed(3)}</div>
              <div class="insight-sub">${metricDisplayName(data.metric)}</div>
          </div>
      `;
  }

  function renderChart(data) {
      const ctx = document.getElementById('metric-chart').getContext('2d');
      if (chart) chart.destroy();
      if (!data.data || data.data.length === 0) {
          ctx.canvas.parentElement.innerHTML = '<div class="empty-state" style="padding: 2rem 0;">' +
              '<div class="empty-state-icon"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div>' +
              '<div class="empty-state-desc" style="margin-bottom: 0;">Upload more attempts to see trends for this metric.</div></div>';
          document.getElementById('insights-panel').style.display = 'none';
          return;
      }
      chart = new Chart(ctx, {
          type: 'bar',
          data: {
              labels: data.data.map(d => new Date(d.date).toLocaleDateString()),
              datasets: [{
                  data: data.data.map(d => d.value),
                  backgroundColor: 'rgba(245, 158, 11, 0.6)',
                  borderRadius: 4,
              }]
          },
          options: {
              responsive: true,
              maintainAspectRatio: false,
              plugins: { legend: { display: false } },
              scales: {
                  x: { grid: { display: false }, ticks: { color: '#64748b', font: { size: 10 } } },
                  y: { grid: { color: '#1a2332' }, ticks: { color: '#64748b', font: { size: 10 } } },
              }
          }
      });
      renderInsights(data);
  }

  function onMetricChange(value) {
      currentMetric = value;
      // Re-create canvas if it was replaced by empty state
      const container = document.querySelector('.chart-container');
      if (!container.querySelector('canvas')) {
          container.innerHTML = '<canvas id="metric-chart"></canvas>';
      }
      loadChart();
  }

  async function loadGoals() {
      const res = await apiRequest(`/api/goals?route_id=${routeId}`);
      if (!res.ok) return;
      const goals = await res.json();
      renderGoals(goals.filter(g => !g.achieved));
  }

  function renderGoals(goals) {
      const container = document.getElementById('goals-list');
      if (goals.length === 0) {
          container.innerHTML = '<div class="empty-state" style="padding: 1.5rem 0;">' +
              '<div class="empty-state-icon"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg></div>' +
              '<div class="empty-state-desc" style="margin-bottom: 0;">Set a goal from your profile to track progress on this route.</div></div>';
          return;
      }
      container.innerHTML = goals.map(g => {
          const pct = g.target_value > 0 ? Math.min(100, Math.round((g.current_value / g.target_value) * 100)) : 0;
          const name = g.metric_name.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
          return `
              <div class="goal-item">
                  <div class="goal-item-header">
                      <span>${escapeHtml(name)}</span>
                      <span class="goal-item-target">${g.current_value || 0} / ${g.target_value}</span>
                  </div>
                  <div class="progress-bar">
                      <div class="progress-fill" style="width: ${pct}%;"></div>
                  </div>
              </div>
          `;
      }).join('');
  }

  async function deleteRoute() {
      if (!confirm('Delete this route and all its attempts?')) return;
      const res = await apiRequest(`/api/routes/${routeId}`, { method: 'DELETE' });
      if (res.ok) { window.location.href = '/'; }
  }

  function openEditModal() {
      if (!routeData) return;
      document.getElementById('edit-name').value = routeData.name || '';
      document.getElementById('edit-grade').value = routeData.grade || '';
      document.getElementById('edit-grade-system').value = routeData.grade_system || 'V';
      document.getElementById('edit-type').value = routeData.type || 'boulder';
      document.getElementById('edit-status').value = routeData.status || 'projecting';
      document.getElementById('edit-location').value = routeData.location || '';
      openModal(document.getElementById('edit-route-modal'));
  }

  async function editRoute(e) {
      e.preventDefault();
      const form = e.target;
      const data = {};
      ['name', 'grade', 'grade_system', 'type', 'location', 'status'].forEach(f => {
          if (form[f].value) data[f] = form[f].value;
      });
      const res = await apiRequest(`/api/routes/${routeId}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data),
      });
      if (res.ok) {
          showAlert('Route updated', 'success');
          closeModal(document.getElementById('edit-route-modal'));
          loadRoute();
      } else {
          const err = await res.json().catch(() => ({}));
          const detail = err.detail;
          const msg = Array.isArray(detail) ? detail.map(d => d.msg).join(', ') : detail || 'Failed to update route';
          showAlert(msg, 'error');
      }
  }

  async function createGoal(e) {
      e.preventDefault();
      const form = e.target;
      const data = {
          metric_name: form.metric_name.value,
          target_value: parseFloat(form.target_value.value),
          route_id: routeId,
      };
      if (form.deadline.value) data.deadline = new Date(form.deadline.value).toISOString();
      const res = await apiRequest('/api/goals', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data),
      });
      if (res.ok) {
          showAlert('Goal created', 'success');
          closeModal(document.getElementById('goal-modal'));
          form.reset();
          loadGoals();
      } else {
          const err = await res.json().catch(() => ({}));
          showAlert(err.detail || 'Failed to create goal', 'error');
      }
  }

  loadRoute();
</script>
{% endblock %}
