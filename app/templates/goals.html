{% extends "base.html" %} {% block title %}Goals - ClimbSensei{% endblock %} {%
block content %}
<div
  style="
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 2rem;
  "
>
  <h1>Training Goals</h1>
  <button onclick="showCreateModal()" class="btn">+ New Goal</button>
</div>

<div class="card" style="margin-bottom: 2rem">
  <label>
    <input type="checkbox" id="showAchieved" onchange="toggleAchieved()" />
    Show Achieved Goals
  </label>
</div>

<div id="goals-list">
  <p style="color: #666; text-align: center">Loading goals...</p>
</div>

<!-- Create/Edit Goal Modal -->
<div id="goalModal" class="modal hidden">
  <div class="modal-content card" style="max-width: 500px; margin: 2rem auto">
    <h2 id="modalTitle">Create Goal</h2>
    <form id="goalForm">
      <input type="hidden" id="goalId" />

      <div class="form-group">
        <label for="metric_name">Metric *</label>
        <select id="metric_name" required>
          <option value="">-- Select Metric --</option>
          <option value="avg_velocity">Average Velocity</option>
          <option value="max_velocity">Max Velocity</option>
          <option value="avg_acceleration">Average Acceleration</option>
          <option value="max_acceleration">Max Acceleration</option>
          <option value="movement_efficiency">Movement Efficiency</option>
          <option value="avg_stability">Average Stability</option>
          <option value="lock_off_count">Lock-off Count</option>
          <option value="lock_off_duration_avg">Avg Lock-off Duration</option>
          <option value="max_reach">Max Reach</option>
          <option value="hip_shoulder_separation_avg">
            Avg Hip-Shoulder Separation
          </option>
          <option value="max_height">Max Height</option>
          <option value="total_distance">Total Distance</option>
          <option value="vertical_distance">Vertical Distance</option>
          <option value="lateral_distance">Lateral Distance</option>
        </select>
      </div>

      <div class="form-group">
        <label for="target_value">Target Value *</label>
        <input type="number" id="target_value" step="0.001" required />
      </div>

      <div class="form-group">
        <label for="current_value">Current Value (Optional)</label>
        <input type="number" id="current_value" step="0.001" />
      </div>

      <div class="form-group">
        <label for="deadline">Deadline (Optional)</label>
        <input type="date" id="deadline" />
      </div>

      <div style="display: flex; gap: 1rem">
        <button type="submit" class="btn">Save</button>
        <button type="button" onclick="hideModal()" class="btn btn-secondary">
          Cancel
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %} {% block extra_css %}
<style>
  .modal {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.5);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .modal.hidden {
    display: none;
  }

  .goal-card {
    background: white;
    padding: 1.5rem;
    border-radius: 8px;
    margin-bottom: 1rem;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
  }

  .goal-header {
    display: flex;
    justify-content: space-between;
    align-items: start;
    margin-bottom: 1rem;
  }

  .goal-actions {
    display: flex;
    gap: 0.5rem;
  }
</style>
{% endblock %} {% block extra_js %}
<script>
  // Require authentication
  if (!authToken) {
    window.location.href = "/login";
  }

  let goals = [];
  let showAchieved = false;

  async function loadGoals() {
    try {
      const response = await apiRequest(
        `${API_BASE}/goals?active_only=${!showAchieved}`,
      );
      goals = await response.json();
      displayGoals();
    } catch (error) {
      console.error("Failed to load goals:", error);
      showAlert("Failed to load goals", "error");
    }
  }

  function toggleAchieved() {
    showAchieved = document.getElementById("showAchieved").checked;
    loadGoals();
  }

  function displayGoals() {
    const container = document.getElementById("goals-list");

    if (goals.length === 0) {
      container.innerHTML =
        '<div class="card"><p style="color: #666; text-align: center;">No goals yet. Create your first goal to track your progress!</p></div>';
      return;
    }

    container.innerHTML = goals
      .map((goal) => {
        const progress =
          goal.current_value && goal.target_value
            ? Math.min((goal.current_value / goal.target_value) * 100, 100)
            : 0;

        const isOverdue =
          goal.deadline &&
          new Date(goal.deadline) < new Date() &&
          !goal.achieved;

        return `
                <div class="goal-card">
                    <div class="goal-header">
                        <div style="flex: 1;">
                            <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 0.5rem;">
                                <h3 style="margin: 0;">${formatMetricName(goal.metric_name)}</h3>
                                ${goal.achieved ? '<span class="badge badge-success">✓ Achieved</span>' : ""}
                                ${isOverdue ? '<span class="badge badge-error">Overdue</span>' : ""}
                            </div>
                            <p style="color: #666; margin: 0;">
                                Target: ${goal.target_value}
                                ${goal.current_value !== null ? `• Current: ${goal.current_value}` : ""}
                            </p>
                            ${
                              goal.deadline
                                ? `
                                <p style="color: #666; margin: 0.5rem 0 0 0;">
                                    📅 ${goal.achieved ? "Achieved on" : "Due"}: ${new Date(goal.achieved ? goal.achieved_at : goal.deadline).toLocaleDateString()}
                                </p>
                            `
                                : ""
                            }
                        </div>
                        <div class="goal-actions">
                            ${!goal.achieved ? `<button onclick="editGoal(${goal.id})" class="btn btn-secondary">Edit</button>` : ""}
                            <button onclick="deleteGoal(${goal.id})" class="btn btn-danger">Delete</button>
                        </div>
                    </div>
                    ${
                      !goal.achieved
                        ? `
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${progress}%">
                                ${progress.toFixed(1)}%
                            </div>
                        </div>
                    `
                        : ""
                    }
                </div>
            `;
      })
      .join("");
  }

  function formatMetricName(name) {
    return name
      .split("_")
      .map((word) => word.charAt(0).toUpperCase() + word.slice(1))
      .join(" ");
  }

  function showCreateModal() {
    document.getElementById("modalTitle").textContent = "Create Goal";
    document.getElementById("goalForm").reset();
    document.getElementById("goalId").value = "";
    document.getElementById("goalModal").classList.remove("hidden");
  }

  function hideModal() {
    document.getElementById("goalModal").classList.add("hidden");
  }

  async function editGoal(id) {
    const goal = goals.find((g) => g.id === id);
    if (!goal) return;

    document.getElementById("modalTitle").textContent = "Edit Goal";
    document.getElementById("goalId").value = goal.id;
    document.getElementById("metric_name").value = goal.metric_name;
    document.getElementById("target_value").value = goal.target_value;
    document.getElementById("current_value").value = goal.current_value || "";
    document.getElementById("deadline").value = goal.deadline || "";
    document.getElementById("goalModal").classList.remove("hidden");
  }

  async function deleteGoal(id) {
    if (!confirm("Are you sure you want to delete this goal?")) return;

    try {
      const response = await apiRequest(`${API_BASE}/goals/${id}`, {
        method: "DELETE",
      });

      if (response.ok) {
        showAlert("Goal deleted successfully", "success");
        loadGoals();
      } else {
        throw new Error("Failed to delete goal");
      }
    } catch (error) {
      showAlert(error.message, "error");
    }
  }

  document.getElementById("goalForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const id = document.getElementById("goalId").value;
    const data = {
      metric_name: document.getElementById("metric_name").value,
      target_value: parseFloat(document.getElementById("target_value").value),
      current_value: document.getElementById("current_value").value
        ? parseFloat(document.getElementById("current_value").value)
        : null,
      deadline: document.getElementById("deadline").value || null,
    };

    try {
      const url = id ? `${API_BASE}/goals/${id}` : `${API_BASE}/goals`;
      const method = id ? "PATCH" : "POST";

      const response = await apiRequest(url, {
        method: method,
        body: JSON.stringify(data),
      });

      if (response.ok) {
        showAlert(`Goal ${id ? "updated" : "created"} successfully`, "success");
        hideModal();
        loadGoals();
      } else {
        const error = await response.json();
        throw new Error(
          error.detail || `Failed to ${id ? "update" : "create"} goal`,
        );
      }
    } catch (error) {
      showAlert(error.message, "error");
    }
  });

  // Load goals on page load
  loadGoals();
</script>
{% endblock %}
